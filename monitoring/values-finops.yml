grafana:

  adminUser: admin
  adminPassword: admin123
  service:
    type: NodePort
    nodePort: 31668

  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
alertmanager:
  enabled: false

prometheus:
  prometheusSpec:
    scrapeInterval: "60s"
    evaluationInterval: "60s"
    retention: "1h"

    resources:
      requests:
        memory: 150Mi
        cpu: 100m
      limits:
        memory: 300Mi
        cpu: 300m
